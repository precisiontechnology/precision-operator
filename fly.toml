app = "precision-operator-test"
primary_region = "ewr"

[build]

[mounts]
  source = "openclaw_data"
  destination = "/home/node/.openclaw"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[env]
  # Per-user injection (optional)
  # PRECISION_USER_NAME = "Test Account"
  # PRECISION_USER_CONTEXT = "Testing deployment"