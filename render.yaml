services:
  - type: pserv
    name: precision-operator-test
    runtime: docker
    region: virginia
    plan: standard
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: PRECISION_GATEWAY_TOKEN
        sync: false
      - key: PRECISION_API_URL
        sync: false
    disk:
      name: openclaw-data
      mountPath: /home/node/.openclaw
      sizeGB: 1
